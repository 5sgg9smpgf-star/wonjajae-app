<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원자재 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
header { background: #1a56db; color: white; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
header h1 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.sw { display: flex; gap: 8px; }
.sw input { flex:1; padding:10px 14px; border:none; border-radius:8px; font-size:15px; outline:none; }
.sw select { padding:10px 8px; border:none; border-radius:8px; font-size:14px; outline:none; background:white; color:#333; }
.sortw { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.sb { padding:5px 12px; border:1.5px solid rgba(255,255,255,.5); border-radius:20px; background:transparent; color:white; font-size:12px; cursor:pointer; white-space:nowrap; position:relative; }
.sb.active { background:white; color:#1a56db; border-color:white; font-weight:700; }
.sb .badge { position:absolute; top:-6px; right:-6px; background:#e53e3e; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:700; }
.stats { padding:10px 16px; font-size:13px; color:#666; background:white; border-bottom:1px solid #e0e0e0; }
.list { padding:12px; display:flex; flex-direction:column; gap:10px; }
.card { background:white; border-radius:12px; padding:14px 16px; box-shadow:0 1px 4px rgba(0,0,0,.08); cursor:pointer; }
.ch { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.cno { font-size:11px; color:#999; flex-shrink:0; margin-top:2px; }
.cp { font-size:16px; font-weight:700; color:#1a56db; flex:1; }
.cprice { font-size:13px; font-weight:700; color:#e53e3e; flex-shrink:0; }
.csup { font-size:13px; color:#555; margin-top:4px; }
.cspec { font-size:12px; color:#888; margin-top:3px; }
.ctags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.tag { font-size:11px; padding:2px 8px; border-radius:20px; background:#e8f0ff; color:#1a56db; }
.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:flex-end; }
.ov.open { display:flex; }
.modal { background:white; width:100%; max-height:85vh; border-radius:20px 20px 0 0; overflow-y:auto; padding:20px; }
.mh { width:40px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 16px; }
.modal h2 { font-size:18px; font-weight:700; color:#1a56db; margin-bottom:4px; }
.mspec { font-size:13px; color:#888; margin-bottom:8px; }
.mprice { font-size:16px; font-weight:700; color:#e53e3e; margin-bottom:16px; }
.it { width:100%; border-collapse:collapse; }
.it tr { border-bottom:1px solid #f0f0f0; }
.it td { padding:10px 4px; font-size:14px; vertical-align:top; }
.it td:first-child { color:#999; font-size:12px; width:80px; white-space:nowrap; }
.ft { width:100%; border-collapse:collapse; margin-top:12px; }
.ft th,.ft td { padding:8px 10px; text-align:center; font-size:13px; border:1px solid #e0e0e0; }
.ft th { background:#1a56db; color:white; }
.ft tr:nth-child(even) td { background:#f8f9ff; }
.stitle { font-size:13px; font-weight:700; color:#555; margin:16px 0 8px; }
.cbtn { display:block; width:100%; margin-top:20px; padding:14px; background:#1a56db; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
.nr { text-align:center; padding:60px 20px; color:#aaa; font-size:15px; }
.pl { color:#1a56db; text-decoration:none; }
</style>
</head>
<body>
<header>
  <h1>📦 원자재 관리</h1>
  <div class="sw">
    <input type="search" id="si" placeholder="품명, 규격, 구입처 검색..." oninput="render()">
    <select id="sf" onchange="render()"><option value="">전체</option></select>
  </div>
  <div class="sortw">
    <button class="sb active" data-field="none" onclick="toggleSort(this)">기본순</button>
    <button class="sb" data-field="iy" data-dir="" data-label="이형력순" onclick="toggleSort(this)">이형력순</button>
    <button class="sb" data-field="ja" data-dir="" data-label="점착력순" onclick="toggleSort(this)">점착력순</button>
    <button class="sb" data-field="je" data-dir="" data-label="접착력순" onclick="toggleSort(this)">접착력순</button>
    <button class="sb" data-field="price" data-dir="" data-label="가격순" onclick="toggleSort(this)">가격순</button>
  </div>
</header>
<div class="stats" id="stats"></div>
<div class="list" id="list"></div>
<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="modal">
    <div class="mh"></div>
    <div id="mc"></div>
    <button class="cbtn" onclick="document.getElementById('ov').classList.remove('open')">닫기</button>
  </div>
</div>

"", "iy_spec": "", "iy_avg": "", "ja_spec": "", "ja_avg": "", "je_spec": "", "je_avg": "", "usage": "", "note": ""}, {"no": "312", "supplier": "㈜상아프론테크", "contact_name": "박종훈 책임님", "contact_phone": "010-4801-1937", "product": "", "spec": "", "price": "", "iy_spec": "", "iy_avg": "", "ja_spec": "", "ja_avg": "", "je_spec": "", "je_avg": "", "usage": "", "note": ""}, {"no": "313", "supplier": "㈜상아프론테크", "contact_name": "박종훈 책임님", "contact_phone": "010-4801-1937", "product": "", "spec": "", "price": "", "iy_spec": "", "iy_avg": "", "ja_spec": "", "ja_avg": "", "je_spec": "", "je_avg": "", "usage": "", "note": ""}, {"no": "314", "supplier": "㈜상아프론테크", "contact_name": "박종훈 책임님", "contact_phone": "010-4801-1937", "product": "", "spec": "", "price": "", "iy_spec": "", "iy_avg": "", "ja_spec": "", "ja_avg": "", "je_spec": "", "je_avg": "", "usage": "", "note": ""}, {"no": "315", "supplier": "㈜상아프론테크", "contact_name": "박종훈 책임님", "contact_phone": "010-4801-1937", "product": "", "spec": "", "price": "", "iy_spec": "", "iy_avg": "", "ja_spec": "", "ja_avg": "", "je_spec": "", "je_avg": "", "usage": "", "note": ""}];
const km={price:'price',iy:'iy_avg',ja:'ja_avg',je:'je_avg'};
let sorts=[];
function pn(v){if(!v)return null;const m=v.toString().replace(/,/g,'').match(/[\d.]+/);return m?parseFloat(m[0]):null;}
function fp(v){const n=pn(v);return n?n.toLocaleString('ko-KR')+'원':'';}
function calcSqm(spec,price){
  if(!spec||!price)return null;
  const nums=spec.replace(/,/g,'').match(/[\d.]+/g);
  if(!nums||nums.length<2)return null;
  const w=parseFloat(nums[0])/1000;
  const l=parseFloat(nums[1]);
  const sqm=w*l;
  if(sqm<=0)return null;
  return Math.round(parseFloat(price)/sqm);
}
function toggleSort(el){
  const field=el.getAttribute('data-field');
  if(field==='none'){
    sorts=[];
    document.querySelectorAll('.sb[data-field]').forEach(b=>{
      b.classList.remove('active');
      if(b.getAttribute('data-field')!=='none'){b.setAttribute('data-dir','');b.textContent=b.getAttribute('data-label');}
    });
    el.classList.add('active');
    render();return;
  }
  document.querySelector('[data-field="none"]').classList.remove('active');
  const cur=el.getAttribute('data-dir');
  const label=el.getAttribute('data-label');
  const idx=sorts.findIndex(s=>s.startsWith(field+'_'));
  if(idx>=0) sorts.splice(idx,1);
  let newDir=cur===''?'asc':cur==='asc'?'desc':'';
  if(newDir){
    sorts.push(field+'_'+newDir);
    el.setAttribute('data-dir',newDir);
    el.textContent=label+' '+(newDir==='asc'?'↑':'↓');
    el.classList.add('active');
  } else {
    el.setAttribute('data-dir','');
    el.textContent=label;
    el.classList.remove('active');
  }
  if(!sorts.length) document.querySelector('[data-field="none"]').classList.add('active');
  render();
}
function init(){
  const sups=[...new Set(allData.map(d=>d.supplier).filter(s=>s))].sort();
  const sel=document.getElementById('sf');
  sups.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}
function render(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  const sup=document.getElementById('sf').value;
  let f=allData.filter(d=>{
    const ms=!sup||d.supplier===sup;
    const mq=!q||[d.product,d.spec,d.supplier,d.usage,d.note].some(v=>v.toLowerCase().includes(q));
    return ms&&mq;
  });
  if(sorts.length){
    const activeFields=new Set(sorts.map(s=>{const p=s.split('_');p.pop();return km[p.join('_')];}));
    f=f.filter(d=>[...activeFields].every(key=>pn(d[key])!==null));
    f=[...f].sort((a,b)=>{
      for(const s of sorts){
        const parts=s.split('_');const dir=parts.pop();const field=parts.join('_');const key=km[field];
        const av=pn(a[key]),bv=pn(b[key]);
        const r=dir==='asc'?av-bv:bv-av;
        if(r!==0)return r;
      }
      return 0;
    });
  }
  document.getElementById('stats').textContent=`총 ${allData.length}개 중 ${f.length}개 표시`;
  const list=document.getElementById('list');
  if(!f.length){list.innerHTML='<div class="nr">검색 결과가 없습니다.</div>';return;}
  list.innerHTML=f.map(d=>{
    const tags=[];if(d.iy_spec)tags.push('이형력');if(d.ja_spec)tags.push('점착력');if(d.je_spec)tags.push('접착력');
    const ps=fp(d.price);const idx=allData.indexOf(d);
    const sqm=calcSqm(d.spec,d.price);const sqms=sqm?sqm.toLocaleString('ko-KR')+'원/㎡':'';
    return '<div class="card" onclick="openM('+idx+')">'
      +'<div class="ch"><span class="cno">No.'+d.no+'</span><span class="cp">'+(d.product||'-')+'</span></div>'
      +'<div class="csup">'+(d.supplier||'')+'</div>'
      +(d.spec?'<div class="cspec">'+d.spec+'</div>':'')
      +((d.iy_spec||d.iy_avg||d.ja_spec||d.ja_avg||d.je_spec||d.je_avg)?
        '<table style="margin-top:8px;font-size:12px;border-collapse:collapse;width:100%">'
        +'<tr style="background:#f0f4ff"><th style="padding:4px 8px;text-align:left;color:#1a56db;font-weight:600;border:1px solid #dde5ff">항목</th><th style="padding:4px 8px;text-align:center;color:#1a56db;font-weight:600;border:1px solid #dde5ff">SPEC</th><th style="padding:4px 8px;text-align:center;color:#1a56db;font-weight:600;border:1px solid #dde5ff">실측</th></tr>'
        +(d.iy_spec||d.iy_avg?'<tr><td style="padding:4px 8px;border:1px solid #eee">이형력</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.iy_spec||'-')+'</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.iy_avg||'-')+'</td></tr>':'')
        +(d.ja_spec||d.ja_avg?'<tr style="background:#fafafa"><td style="padding:4px 8px;border:1px solid #eee">점착력</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.ja_spec||'-')+'</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.ja_avg||'-')+'</td></tr>':'')
        +(d.je_spec||d.je_avg?'<tr><td style="padding:4px 8px;border:1px solid #eee">접착력</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.je_spec||'-')+'</td><td style="padding:4px 8px;text-align:center;border:1px solid #eee">'+(d.je_avg||'-')+'</td></tr>':'')
        +'</table>':'')
      +'</div>';
  }).join('');
}
function openM(idx){
  const d=allData[idx];const hf=d.iy_spec||d.iy_avg||d.ja_spec||d.ja_avg||d.je_spec||d.je_avg;const ps=fp(d.price);
  const sqm=calcSqm(d.spec,d.price);const sqms=sqm?sqm.toLocaleString('ko-KR')+'원/㎡':'';
  document.getElementById('mc').innerHTML='<h2>'+(d.product||'-')+'</h2><div class="mspec">'+(d.spec||'')+'</div>'+(ps?'<div class="mprice">'+ps+(sqms?' <span style="font-size:14px;font-weight:400;color:#999">('+sqms+')</span>':'')+'</div>':'')+'<table class="it"><tr><td>No.</td><td>'+d.no+'</td></tr><tr><td>구입처</td><td>'+(d.supplier||'-')+'</td></tr><tr><td>담당자</td><td>'+(d.contact_name||'-')+'</td></tr><tr><td>연락처</td><td>'+(d.contact_phone?'<a class="pl" href="tel:'+d.contact_phone+'">'+d.contact_phone+'</a>':'-')+'</td></tr>'+(d.usage?'<tr><td>사용용도</td><td>'+d.usage+'</td></tr>':'')+(d.note?'<tr><td>비고</td><td>'+d.note+'</td></tr>':'')+'</table>'+(hf?'<div class="stitle">물성 데이터 (g.f)</div><table class="ft"><tr><th>항목</th><th>SPEC</th><th>실측(AVG)</th></tr>'+(d.iy_spec||d.iy_avg?'<tr><td>이형력</td><td>'+(d.iy_spec||'-')+'</td><td>'+(d.iy_avg||'-')+'</td></tr>':'')+(d.ja_spec||d.ja_avg?'<tr><td>점착력</td><td>'+(d.ja_spec||'-')+'</td><td>'+(d.ja_avg||'-')+'</td></tr>':'')+(d.je_spec||d.je_avg?'<tr><td>접착력</td><td>'+(d.je_spec||'-')+'</td><td>'+(d.je_avg||'-')+'</td></tr>':'')+'</table>':'');
  document.getElementById('ov').classList.add('open');
}
function closeOv(e){if(e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('open');}
init();render();
</script>
