<script>
var data = JSON.parse(document.getElementById("rawdata").textContent);

function n(v) {
  if (v === null || v === undefined || v === "") return "-";
  return Number(v).toLocaleString("ko-KR");
}

function render() {
  var q = document.getElementById("searchInput").value.trim().toLowerCase();
  var filtered = [];
  for (var i = 0; i < data.length; i++) {
    var d = data[i];

        (d.code||"").toLowerCase().indexOf(q) >= 0 ||
        (d.spec||"").toLowerCase().indexOf(q) >= 0) {
      filtered.push(i);
    }
  }
  document.getElementById("badge").textContent = data.length + "개";
  document.getElementById("info").textContent = q
    ? filtered.length + "개 검색됨 (전체 " + data.length + "개)"
    : "전체 " + data.length + "개 품목";
  var isEmpty = filtered.length === 0;
  document.getElementById("empty").style.display = isEmpty ? "block" : "none";
  var cards = "", rows = "";
  for (var j = 0; j < filtered.length; j++) {
    var idx = filtered[j];
    var d = data[idx];
    cards += "<div class=\"card\">";
    cards += "<div class=\"card-top\">";
    cards += "<div class=\"card-name\">" + (d.name || "") + "</div>";
    cards += "<div class=\"card-price\">" + n(d.price) + "원</div>";
    cards += "</div>";
    cards += "<div class=\"card-meta\">";
    if (d.code) cards += "<span><span class=\"label\">코드</span>" + d.code + "</span>";
    if (d.spec) cards += "<span><span class=\"label\">규격</span><span class=\"card-spec\">" + d.spec + "</span></span>";
    if (d.unit) cards += "<span><span class=\"label\">단위</span>" + d.unit + "</span>";
    cards += "</div></div>";
    rows += "<tr>";
    rows += "<td class=\"tc-no\">" + (d.no || "") + "</td>";
    rows += "<td class=\"tc-code\">" + (d.code || "") + "</td>";
    rows += "<td class=\"tc-name\">" + (d.name || "") + "</td>";
    rows += "<td class=\"tc-spec\">" + (d.spec || "") + "</td>";
    rows += "<td class=\"tc-unit\">" + (d.unit || "") + "</td>";
    rows += "<td class=\"tc-price\">" + n(d.price) + "</td>";
    rows += "</tr>";
  }
  document.getElementById("cardList").innerHTML = isEmpty ? "" : cards;
  document.getElementById("tbody").innerHTML = isEmpty ? "" : rows;
}
render();
</script>
</body>
</html>
